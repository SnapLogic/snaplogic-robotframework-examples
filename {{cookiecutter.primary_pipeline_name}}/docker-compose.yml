# docker-compose.yml
include:
  - docker/oracle/docker-compose.oracle.yml
  - docker/groundplex/docker-compose.groundplex.yml
  - docker/minio/docker-compose.s3emulator.yml
  - docker/postgres/docker-compose.postgres.yml
  - docker/sqlserver/docker-compose.sqlserver.yml
  - docker/mysql/docker-compose.mysql.yml
  - docker/db2/docker-compose.db2.yml
  - docker/salesforce/docker-compose.salesforce-django.yml
  - docker/kafka/docker-compose.kafka.yml
  - docker/email/docker-compose.email-mock.yml
  - docker/jupyter/docker-compose.jupyter.yml

services:
  tools:
    build:
      context: ./src/tools
      dockerfile: ../../robot.Dockerfile
    platform: linux/amd64  # Force x86_64 for ibm_db compatibility
    container_name: snaplogic-test-example-tools-container
    image: snaplogic-test-example:latest
    environment:
      # Travis CI Build Metadata - automatically set by Travis
      # These provide context about who/what/when triggered the build
      # Safe to ignore for local development
      TRAVIS_EVENT_TYPE: ${TRAVIS_EVENT_TYPE:-}
      TRAVIS_COMMIT_AUTHOR_NAME: ${TRAVIS_COMMIT_AUTHOR_NAME:-Unknown}
      TRAVIS_REPO_SLUG: ${TRAVIS_REPO_SLUG:-}
      TRAVIS_BUILD_WEB_URL: ${TRAVIS_BUILD_WEB_URL:-}
      TRAVIS_BUILD_NUMBER: ${TRAVIS_BUILD_NUMBER:-}
      TRAVIS_TEST_RESULT: ${TRAVIS_TEST_RESULT:-}
      TRAVIS_BUILD_ID: ${TRAVIS_BUILD_ID:-}
      TRAVIS_COMMIT_MESSAGE: ${TRAVIS_COMMIT_MESSAGE:-}
      TRAVIS_COMMIT: ${TRAVIS_COMMIT:-}
      TRAVIS_DURATION: ${TRAVIS_DURATION:-0}
      TRAVIS_BRANCH: ${TRAVIS_BRANCH:-}
      # AWS SSO support — pass AWS_PROFILE from host so boto3 inside the
      # container uses the SSO profile configured by `aws sso login`.
      # Leave empty if not using SSO (MinIO or access-key mode).
      AWS_PROFILE: ${AWS_PROFILE:-}
    volumes:
      - ./src:/app/src
      - ./test:/app/test
      - ./.env:/app/.env
      - ./env_files:/app/env_files:ro  # Mount entire env_files directory
      - ./travis_scripts/setup_travis_env.sh:/app/travis_scripts/setup_travis_env.sh
      - ./.travis.yml:/app/.travis.yml
      - ./test/suite/test_data:/opt/snaplogic/test_data
      # AWS credentials (read-write) — required for AWS SSO mode.
      # Host's ~/.aws/ (containing SSO cache + profile config) is mounted
      # into the container so boto3 can read SSO-cached credentials AND
      # save refreshed tokens back to the host cache.
      #
      # Why read-write (not :ro): SSO tokens are short-lived (~8-12h) and
      # boto3 proactively refreshes them when they enter the "refresh
      # window" near expiry. The refresh writes a new token file to
      # ~/.aws/sso/cache/ — with a read-only mount, that write fails with
      # OSError EROFS and the test fails on a still-valid (just near-expiry)
      # token. With read-write, refresh works transparently and the
      # refreshed token persists on the host (no need to re-login as often).
      #
      # Trade-off: the container can modify your host's ~/.aws/ contents.
      # Acceptable for a dev machine running your own test code; reconsider
      # for CI environments running untrusted test code.
      # Safe to keep mounted in all modes — ignored when SSO is not in use.
      - ${HOME}/.aws:/root/.aws
      # Optional: Add mounts for common local directories (uncomment as needed)
      # - ~/Documents:/opt/host-documents:ro
      # - ~/Downloads:/opt/host-downloads:ro
      # - ~/Desktop:/opt/host-desktop:ro
    command: [ "sh", "-c", "echo 'Tools container started' && tail -f /dev/null" ]
    profiles: [ tools ]
    networks:
      - snaplogicnet

networks:
  snaplogicnet:
    driver: bridge
