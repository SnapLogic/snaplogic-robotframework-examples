services:
  jupyter:
    image: snaplogic-test-example:latest      # uses the tools image (built from robot.Dockerfile)
    platform: linux/amd64
    container_name: snaplogic-jupyter
    ports:
      - "${JUPYTER_PORT:-8888}:8888"
    env_file:
      - ../../.env
    volumes:
      - ../../src:/app/src
      - ../../test:/app/test
      - ../../.env:/app/.env
      - ../../env_files:/app/env_files:ro
      - ../../test/suite/test_data:/opt/snaplogic/test_data
    working_dir: /app
    command: >
      jupyter lab
      --ip=0.0.0.0
      --port=8888
      --no-browser
      --allow-root
      --NotebookApp.token=''
      --ServerApp.allow_origin=*
    profiles: [ jupyter-dev ]
    networks:
      - snaplogicnet

networks:
  snaplogicnet:
    driver: bridge
